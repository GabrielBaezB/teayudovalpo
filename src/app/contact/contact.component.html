<div class="container py-5">
    <h1>Contáctanos</h1>
    <p>Deja tu información y en breve estaremos contigo.</p>
    <form [formGroup]="datos">
    <!-- Formulario-->
    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Nombre</label>
        <input type="text" class="form-control" formControlName="nombre" placeholder="Escribe tu nombre" name="nombre">
    </div>
    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Correo</label>
        <input type="email" class="form-control" formControlName="correo" placeholder="name@example.com" name="email">
    </div>
    <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">Deja tu mensaje</label>
        <textarea class="form-control" formControlName="mensaje" rows="3" name="mensaje"></textarea>
    </div>
    <button (click)="enviarcorreo()" class="btn btn-primary" style="width: 100%;">Enviar</button>
    <!-- Formulario-->
</form>
</div>
